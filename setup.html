<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTV Core | System Setup</title>
    <style>
        :root { --accent: #D4AF37; --bg: #000; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: #000; color: white; overflow: hidden; font-family: sans-serif; }
        
        /* 360px Loading Bar - Matched to index.android.bundle logic */
        #loader {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: #000; display: flex; flex-direction: column;
            justify-content: center; align-items: center; z-index: 1000;
        }
        .progress-container { width: 360px; height: 8px; background: #333; border-radius: 10px; overflow: hidden; margin-top: 20px; }
        .progress-bar { width: 0%; height: 100%; background: var(--accent); transition: width 0.4s ease; }

        /* Video Container */
        #video-viewport { width: 100%; height: 100vh; display: none; background: #000; }
        video { width: 100%; height: 100%; }

        /* System Overlay Styles */
        .status-header {
            position: absolute; top: 30px; left: 30px;
            padding: 10px 15px; border-left: 2px solid var(--accent);
            background: rgba(0,0,0,0.5); font-size: 0.9rem; letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <div id="loader">
        <img src="02_TeleTV_Logo.jpg" style="width: 200px;">
        <div class="progress-container">
            <div id="fill" class="progress-bar"></div>
        </div>
        <p id="load-text" style="font-size: 0.7rem; color: #666; margin-top: 10px;">MOUNTING RCT_VIDEO_BRIDGE...</p>
    </div>

    <div id="video-viewport">
        <div class="status-header">SYSTEM ONLINE // LIVE_FEED</div>
        <video id="tv-player" controls autoplay poster="02_TeleTV_Logo.jpg">
            <source src="INSERT_YOUR_STREAM_URL_HERE" type="application/x-mpegURL">
        </video>
    </div>

    <script>
        // Security Check
        if (sessionStorage.getItem('tele_auth') !== 'active') { window.location.href = "index.html"; }

        // Boot Sequence logic emulating the bundle's initialization
        window.onload = function() {
            const fill = document.getElementById('fill');
            const text = document.getElementById('load-text');
            let p = 0;

            const boot = setInterval(() => {
                p += Math.floor(Math.random() * 15) + 5;
                if (p > 100) p = 100;
                fill.style.width = p + "%";

                if (p > 80) text.innerText = "HANDSHAKING API...";
                else if (p > 40) text.innerText = "DECODING MANIFEST...";

                if (p === 100) {
                    clearInterval(boot);
                    setTimeout(() => {
                        document.getElementById('loader').style.display = 'none';
                        document.getElementById('video-viewport').style.display = 'block';
                    }, 800);
                }
            }, 250);
        };

        // TV Remote Navigation (Handling Enter, Play, Pause)
        document.addEventListener('keydown', (e) => {
            const v = document.getElementById('tv-player');
            if (e.keyCode === 13 || e.keyCode === 415) v.play(); // Enter or Play
            if (e.keyCode === 19) v.pause(); // Pause
        });
    </script>
</body>
</html>
