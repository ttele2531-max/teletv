<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | System Setup</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 40px; text-align: center; max-width: 500px; width: 100%; backdrop-filter: blur(10px); }
        h1 { color: var(--gold); letter-spacing: 2px; }
        .step { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; margin-bottom: 20px; border-left: 4px solid var(--gold); text-align: left; }
        .step-title { color: var(--gold); font-weight: bold; margin-bottom: 5px; display: block; }
        .download-btn { display: inline-block; background: var(--gold); color: black; text-decoration: none; padding: 12px 25px; border-radius: 50px; font-weight: bold; margin-top: 10px; font-size: 0.8rem; text-transform: uppercase; width: 100%; text-align: center; box-sizing: border-box; border: none; cursor: pointer; }
    </style>
</head>
<body>
    <div class="card">
        <img src="02_TeleTV_Logo.jpg" style="width: 150px; margin-bottom: 20px;" alt="TeleTv Logo">
        <h1>Complete Setup</h1>
        
        <div class="step">
            <span class="step-title">ANDROID / FIRE STICK</span>
            <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/hdo-box.apk" class="download-btn">1. Download HDO Core</a>
            <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/mediaon-player.apk" class="download-btn" style="margin-top:10px;">2. Download Player</a>
        </div>

        <div class="step">
            <span class="step-title">SAMSUNG / LG / LAPTOP</span>
            <button onclick="window.location.href='https://hdo.app/tv'" class="download-btn" style="background: white;">Launch Web Engine</button>
        </div>

        <p style="color: #444; font-size: 0.7rem;">SYSTEM STATUS: ENCRYPTED</p>
    </div>
</body>
</html>
