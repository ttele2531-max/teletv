<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTV | System Dashboard</title>
    <style>
        :root { --accent: #D4AF37; --bg: #000; }
        
        /* Forces the web-app to feel like a native TV app */
        body, html { 
            margin: 0; 
            padding: 0; 
            width: 100%; 
            height: 100%; 
            background: var(--bg); 
            color: white; 
            overflow: hidden; 
            font-family: 'Segoe UI', sans-serif; 
        }

        /* Container for your decompiled app modules */
        #tele-viewport {
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .status-header {
            position: absolute;
            top: 20px;
            left: 20px;
            font-size: 0.7rem;
            letter-spacing: 2px;
            color: #333;
            text-transform: uppercase;
        }

        .app-load-screen {
            text-align: center;
        }

        .app-load-screen img {
            width: 180px;
            margin-bottom: 20px;
            opacity: 0.8;
        }

        .loading-bar {
            width: 200px;
            height: 2px;
            background: #111;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
        }

        .loading-progress {
            width: 40%;
            height: 100%;
            background: var(--accent);
            position: absolute;
            animation: move 2s infinite linear;
        }

        @keyframes move {
            0% { left: -40%; }
            100% { left: 100%; }
        }

        /* Exit button for session termination */
        .exit-btn {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: transparent;
            color: #222;
            border: 1px solid #222;
            padding: 8px 15px;
            font-size: 0.6rem;
            cursor: pointer;
            border-radius: 5px;
            text-transform: uppercase;
        }
        .exit-btn:hover { color: var(--accent); border-color: var(--accent); }

    </style>
</head>
<body>

    <div class="status-header">Auth Verified // Web-App Mode</div>

    <div id="tele-viewport">
        <div class="app-load-screen" id="loader">
            <img src="02_TeleTV_Logo.jpg" alt="TeleTV">
            <div class="loading-bar">
                <div class="loading-progress"></div>
            </div>
        </div>

        <div id="main-app-content"></div>
    </div>

    <button class="exit-btn" onclick="terminate()">Terminate Session</button>

    <script>
        // --- 1. THE SECURITY LOCK ---
        // If someone types this URL directly, boot them back to the gate.
        if (sessionStorage.getItem('tele_auth') !== 'active') {
            window.location.href = "index.html";
        }

        // --- 2. SESSION CONTROL ---
        function terminate() {
            sessionStorage.removeItem('tele_auth');
            window.location.href = "index.html";
        }

        // --- 3. DECOMPILED LOGIC INITIALIZATION ---
        window.onload = function() {
            console.log("TeleTV Engine: Loading Modules...");
            
            // This is where you will add the functions to trigger 
            // your decompiled JS (e.g., initTelePlayer();)
            
            // Example of removing loader after 'app' ready
            setTimeout(() => {
                // document.getElementById('loader').style.display = 'none';
                console.log("TeleTV Engine: Ready for Input.");
            }, 3000);
        };
    </script>
</body>
</html>
