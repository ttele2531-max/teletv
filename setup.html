<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | System Setup</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 40px; text-align: center; max-width: 500px; width: 100%; backdrop-filter: blur(15px); box-shadow: 0 20px 50px rgba(0,0,0,0.8); }
        h1 { color: var(--gold); letter-spacing: 2px; margin-bottom: 30px; font-weight: 300; }
        .step { background: rgba(255,255,255,0.05); padding: 20px; border-radius: 18px; margin-bottom: 20px; border-left: 4px solid var(--gold); text-align: left; }
        .step-title { color: var(--gold); font-weight: bold; margin-bottom: 12px; display: block; font-size: 0.75rem; text-transform: uppercase; }
        .btn { display: block; background: var(--gold); color: black; text-decoration: none; padding: 15px; border-radius: 50px; font-weight: bold; margin-top: 10px; font-size: 0.85rem; text-transform: uppercase; width: 100%; text-align: center; box-sizing: border-box; border: none; cursor: pointer; transition: 0.3s; }
        .btn:hover { background: #f1c40f; transform: scale(1.02); }
    </style>
</head>
<body>

    <div class="card">
        <img src="02_TeleTV_Logo.jpg" style="width: 160px; margin-bottom: 20px;" alt="TeleTv">
        <h1>Complete Setup</h1>
        
        <div class="step">
            <span class="step-title">1. Android & Fire Stick</span>
            <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/hdo-box.apk" class="btn">Download HDO Core</a>
        </div>

        <div class="step">
            <span class="step-title">2. Smart TV & Laptop Engine</span>
            <button onclick="forceWebLaunch()" class="btn" style="background: white;">Launch Web Engine</button>
        </div>

        <p style="color: #444; font-size: 0.6rem; margin-top: 25px;">SECURE TERMINAL | REFRESHED SIGNAL</p>
    </div>

    <script>
        function forceWebLaunch() {
            // We add a random number (?v=...) to the end. 
            // This stops the browser from using its "Memory" of the old APK download.
            var cacheBuster = Math.random();
            window.location.href = "https://hdo.app/tv?v=" + cacheBuster;
        }
    </script>

</body>
</html>
