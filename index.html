<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | Secure Vault</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; width: 90%; backdrop-filter: blur(10px); }
        h1 { color: var(--gold); letter-spacing: 2px; }
        .btn { display: inline-block; background: var(--gold); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="02_TeleTV_Logo.jpg" style="width: 120px; margin-bottom: 20px;">
        <h1>VAULT LOCKED</h1>
        <p style="color: #888;">Sync Handshake Key to proceed.</p>
        <label for="key-upload" class="btn">SYNC NASA KEY</label>
        <input type="file" id="key-upload" accept=".json">
    </div>

    <script>
        document.getElementById('key-upload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const key = JSON.parse(event.target.result);
                    if (key.protocol === "TEL-TV-77-SECURE") {
                        // Redirects to your setup page once authenticated
                        window.location.href = "setup.html";
                    } else { alert("INVALID PROTOCOL"); }
                } catch (err) { alert("KEY ERROR"); }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
