<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | Secure Vault</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; width: 90%; backdrop-filter: blur(10px); box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        h1 { color: var(--gold); letter-spacing: 2px; font-weight: 300; margin-bottom: 10px; }
        .btn { display: inline-block; background: var(--gold); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; border: none; transition: 0.3s; }
        .btn:hover { transform: scale(1.05); background: #f1c40f; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="02_TeleTV_Logo.jpg" style="width: 130px; margin-bottom: 20px;" alt="TeleTv">
        <h1>VAULT LOCKED</h1>
        <p style="color: #666; font-size: 0.9rem;">Sync NASA Key to establish handshake.</p>
        <label for="key-upload" class="btn" id="main-btn">SYNC NASA KEY</label>
        <input type="file" id="key-upload" accept=".json">
    </div>

    <script>
        const keyUpload = document.getElementById('key-upload');
        const mainBtn = document.getElementById('main-btn');

        keyUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    const keyData = JSON.parse(event.target.result);
                    // Validates key if it contains the "TEL-TV" protocol
                    if (keyData.protocol && keyData.protocol.toUpperCase().includes("TEL-TV")) {
                        mainBtn.innerHTML = "ACCESS GRANTED";
                        mainBtn.style.background = "#2ecc71";
                        setTimeout(() => {
                            window.location.replace("setup.html");
                        }, 800);
                    } else {
                        alert("INVALID KEY: Protocol check failed.");
                    }
                } catch (err) {
                    alert("ERROR: File is not a valid NASA Key (.json)");
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
