<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv Pro | Secure Vault</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; overflow: hidden; }
        
        .vault-card { 
            width: 90%; 
            max-width: 400px; 
            padding: 50px 30px; 
            border: 1px solid rgba(212,175,55,0.2); 
            border-radius: 40px; 
            background: rgba(255,255,255,0.03); 
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,1);
        }

        #logo { width: 220px; margin-bottom: 30px; filter: drop-shadow(0 0 15px rgba(212,175,55,0.4)); }
        h2 { font-weight: 200; letter-spacing: 5px; color: var(--gold); text-transform: uppercase; margin-bottom: 10px; }
        p { color: #555; font-size: 0.75rem; letter-spacing: 1px; margin-bottom: 40px; }

        .sync-btn { 
            background: var(--gold); color: black; border: none; padding: 22px; border-radius: 60px; 
            font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 0.9rem; 
            letter-spacing: 2px; transition: 0.3s; box-shadow: 0 15px 30px rgba(212,175,55,0.15);
        }
        .sync-btn:active { transform: scale(0.98); background: #b8952e; }

        #status { margin-top: 25px; font-size: 0.75rem; color: #888; text-transform: uppercase; min-height: 1.2em; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="vault-card">
    <img src="02_TeleTV_Logo.jpg" id="logo" alt="TeleTv Logo">
    <h2>Vault Locked</h2>
    <p>Hardware Security Handshake Required</p>
    
    <input type="file" id="keyFile" accept=".json">
    <button class="sync-btn" onclick="document.getElementById('keyFile').click()">
        Sync NASA Key
    </button>
    
    <div id="status">Awaiting D: Drive Connection...</div>
</div>

<script>
    // --- DESTINATION CONFIGURATION ---
    const APK_DOWNLOAD_URL = "https://github.com/ttele2531-max/teletv/raw/main/hdo-box.apk";
    const TV_WEB_PORTAL = "https://movies7.to/"; 

    document.getElementById('keyFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (!file) return;

        const reader = new FileReader();
        const statusEl = document.getElementById('status');
        
        statusEl.innerText = "Verifying Protocol...";
        statusEl.style.color = "var(--gold)";

        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                
                if (data.handshake_protocol === "TEL-TV-77-SECURE") {
                    statusEl.innerText = "Access Granted. Syncing...";
                    statusEl.style.color = "#00ff88";
                    
                    // Device Detection Logic
                    const isAndroid = /Android|FireCo/i.test(navigator.userAgent);

                    setTimeout(() => { 
                        if (isAndroid) {
                            statusEl.innerText = "Initializing Download...";
                            window.location.href = APK_DOWNLOAD_URL;
                        } else {
                            statusEl.innerText = "Launching Web Vault...";
                            window.location.href = TV_WEB_PORTAL;
                        }
                    }, 1500);
                } else {
                    throw new Error("Mismatch");
                }
            } catch (err) {
                statusEl.innerText = "Access Denied: Invalid Key";
                statusEl.style.color = "#ff4444";
            }
        };
        reader.readAsText(file);
    });

    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log(err));
        });
    }
</script>
</body>
</html>
