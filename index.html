<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv Pro</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body, html { margin: 0; padding: 0; background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; height: 100%; display: flex; justify-content: center; align-items: center; text-align: center; }
        .app-container { width: 90%; max-width: 400px; padding: 40px; border: 1px solid rgba(212,175,55,0.3); border-radius: 30px; background: rgba(255,255,255,0.02); backdrop-filter: blur(10px); }
        #logo { width: 200px; margin-bottom: 20px; filter: drop-shadow(0 0 10px var(--gold)); }
        h2 { font-weight: 300; letter-spacing: 3px; color: var(--gold); margin-bottom: 30px; }
        .sync-btn { background: var(--gold); color: black; border: none; padding: 20px 40px; border-radius: 50px; font-weight: 900; cursor: pointer; text-transform: uppercase; width: 100%; font-size: 1rem; box-shadow: 0 10px 20px rgba(212,175,55,0.2); }
        #status { margin-top: 20px; font-size: 0.8rem; color: #666; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

<div class="app-container">
    <img src="02_TeleTV_Logo.jpg" id="logo">
    <h2>SYSTEM LOCKED</h2>
    
    <input type="file" id="keyFile" accept=".json">
    <button class="sync-btn" onclick="document.getElementById('keyFile').click()">
        SYNC NASA KEY
    </button>
    
    <p id="status">USB Hardware Required to Launch</p>
</div>

<script>
    const BACKBONE_URL = "setup,html"; // Swap this with your actual server/setup page

    document.getElementById('keyFile').addEventListener('change', function(e) {
        const file = e.target.files[0];
        const reader = new FileReader();
        
        document.getElementById('status').innerText = "VERIFYING HARDWARE...";

        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (data.handshake_protocol === "TEL-TV-77-SECURE") {
                    document.getElementById('status').innerText = "ACCESS GRANTED";
                    setTimeout(() => { window.location.href = BACKBONE_URL; }, 800);
                } else { throw new Error(); }
            } catch (err) {
                document.getElementById('status').innerText = "INVALID KEY";
                document.getElementById('status').style.color = "red";
            }
        };
        reader.readAsText(file);
    });

    // PWA Service Worker Registration
    if ('serviceWorker' in navigator) {
        navigator.serviceWorker.register('sw.js');
    }
</script>
</body>
</html>
