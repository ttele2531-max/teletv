<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv Pro | Secure Vault</title>
    <style>
        :root { --gold: #D4AF37; --dark: #0a0a0a; }
        body { background: var(--dark); color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .glass { background: rgba(255,255,255,0.05); border: 1px solid var(--gold); border-radius: 15px; padding: 20px; max-width: 500px; margin: auto; }
        .logo { width: 150px; margin-bottom: 20px; }
        .btn { background: var(--gold); color: black; padding: 15px 25px; border-radius: 50px; text-decoration: none; display: block; margin: 10px auto; font-weight: bold; width: 80%; border: none; cursor: pointer; }
        .hidden { display: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <img src="02_TeleTV_Logo.jpg" class="logo">

    <div id="auth-box" class="glass">
        <h2 style="color: var(--gold);">VAULT LOCKED</h2>
        <p>Sync NASA Key to Proceed</p>
        <label for="key-upload" class="btn">SYNC KEY</label>
        <input type="file" id="key-upload" accept=".json">
    </div>

    <div id="command-center" class="glass hidden">
        <h2 style="color: var(--gold);">ACCESS GRANTED</h2>
        
        <p><strong>ANDROID / FIRE STICK:</strong></p>
        <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/hdo-box.apk" class="btn">DOWNLOAD HDO CORE</a>
        
        <hr style="border: 0; border-top: 1px solid #333; margin: 20px 0;">

        <p><strong>SAMSUNG / LG / WEB:</strong></p>
        <p style="font-size: 0.8rem;">Click below to launch the Web Engine directly.</p>
        <button onclick="launchWeb()" class="btn" style="background: #fff;">LAUNCH WEB PLAYER</button>
    </div>

    <script>
        const keyUpload = document.getElementById('key-upload');
        const authBox = document.getElementById('auth-box');
        const commandCenter = document.getElementById('command-center');

        keyUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(event) {
                try {
                    const keyData = JSON.parse(event.target.result);
                    // Checking for your specific protocol
                    if (keyData.protocol === "TEL-TV-77-SECURE") {
                        authBox.classList.add('hidden');
                        commandCenter.classList.remove('hidden');
                    } else {
                        alert("INVALID KEY");
                    }
                } catch (err) {
                    alert("FILE ERROR");
                }
            };
            reader.readAsText(file);
        });

        function launchWeb() {
            // This is the direct Web Version of HDO Box. 
            // It works on Samsung/LG browsers perfectly.
            window.open('https://hdo.app/tv', '_blank');
        }
    </script>
</body>
</html>
