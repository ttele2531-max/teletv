<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv Pro | Secure Vault</title>
    <style>
        :root { --gold: #D4AF37; --bg: #000; }
        body { margin: 0; background: var(--bg); color: white; font-family: sans-serif; height: 100vh; display: flex; justify-content: center; align-items: center; text-align: center; }
        .vault-card { width: 90%; max-width: 400px; padding: 40px; border: 1px solid rgba(212,175,55,0.3); border-radius: 30px; background: rgba(255,255,255,0.05); backdrop-filter: blur(10px); }
        #logo { width: 200px; margin-bottom: 20px; }
        .btn { display: block; background: var(--gold); color: black; padding: 20px; margin-top: 20px; border-radius: 50px; text-decoration: none; font-weight: bold; text-transform: uppercase; border: none; width: 100%; cursor: pointer; }
        #command-center { display: none; }
        #status { margin-top: 20px; font-size: 0.8rem; color: #888; }
    </style>
</head>
<body>

<div class="vault-card">
    <img src="02_TeleTV_Logo.jpg" id="logo">
    
    <div id="auth-ui">
        <h2>VAULT LOCKED</h2>
        <p>Sync NASA Key to Proceed</p>
        <input type="file" id="keyFile" style="display:none">
        <button class="btn" onclick="document.getElementById('keyFile').click()">SYNC KEY</button>
    </div>

    <div id="command-center">
        <h2>ACCESS GRANTED</h2>
        <p>Install HDO Core & Player:</p>
        <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/hdo-box.apk" class="btn">1. INSTALL HDO BOX</a>
        <a href="https://github.com/ttele2531-max/teletv/releases/download/v1.01/mediaon-player.apk" class="btn">2. INSTALL PLAYER</a>
    </div>
    
    <div id="status">Awaiting Handshake...</div>
</div>

<script>
    document.getElementById('keyFile').addEventListener('change', function(e) {
        const reader = new FileReader();
        reader.onload = function(event) {
            try {
                const data = JSON.parse(event.target.result);
                if (data.handshake_protocol === "TEL-TV-77-SECURE") {
                    document.getElementById('auth-ui').style.display = 'none';
                    document.getElementById('command-center').style.display = 'block';
                    document.getElementById('status').innerText = "SYSTEM READY";
                }
            } catch (err) {
                document.getElementById('status').innerText = "INVALID KEY";
            }
        };
        reader.readAsText(e.target.files[0]);
    });
</script>
</body>
</html>
