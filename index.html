<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | Secure Access</title>
    <style>
        :root {
            --gold: #D4AF37;
            --dark-gold: #A57A03;
            --bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            background-color: var(--bg);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: white; font-family: 'Segoe UI', Roboto, sans-serif;
            display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .glass-card {
            background: var(--glass);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(212, 175, 55, 0.2);
            border-radius: 24px;
            padding: 50px;
            text-align: center;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
            max-width: 400px; width: 90%;
        }

        #logo {
            width: 220px;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 10px rgba(212, 175, 55, 0.3));
        }

        h2 { color: var(--gold); font-weight: 300; letter-spacing: 2px; margin-bottom: 30px; font-size: 1.2rem; }

        .unlock-btn {
            background: linear-gradient(135deg, var(--gold) 0%, var(--dark-gold) 100%);
            color: black; border: none; padding: 18px 40px;
            font-size: 1rem; font-weight: bold; text-transform: uppercase;
            letter-spacing: 2px; border-radius: 50px;
            cursor: pointer; transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(212, 175, 55, 0.2);
        }

        .unlock-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 30px rgba(212, 175, 55, 0.4);
            filter: brightness(1.1);
        }

        #status {
            margin-top: 25px; font-size: 0.8rem;
            color: rgba(255,255,255,0.5); letter-spacing: 1px;
        }

        input[type="file"] { display: none; }
    </style>
</head>
<body>

    <div class="glass-card">
        <img src="02_TeleTV_Logo.jpg" id="logo" alt="TeleTv">
        <h2>SYSTEM ENCRYPTED</h2>
        
        <input type="file" id="keyUpload" accept=".json">
        <button class="unlock-btn" onclick="document.getElementById('keyUpload').click()">
            Insert NASA Key
        </button>

        <p id="status">Awaiting hardware authorization...</p>
    </div>

    <script>
        const BACKBONE_URL = "https://google.com"; // Put your movie server link here
        const REQUIRED_PROTOCOL = "TEL-TV-77-SECURE";

        document.getElementById('keyUpload').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if (!file) return;

            const reader = new FileReader();
            document.getElementById('status').innerText = "VERIFYING KEY...";

            reader.onload = function(event) {
                try {
                    const data = JSON.parse(event.target.result);
                    if (data.handshake_protocol === REQUIRED_PROTOCOL) {
                        document.getElementById('status').style.color = "#D4AF37";
                        document.getElementById('status').innerText = "ACCESS GRANTED";
                        
                        setTimeout(() => {
                            window.location.href = BACKBONE_URL;
                        }, 1000);
                    } else {
                        throw new Error("Invalid protocol");
                    }
                } catch (err) {
                    document.getElementById('status').style.color = "#ff4444";
                    document.getElementById('status').innerText = "INVALID HARDWARE KEY";
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
