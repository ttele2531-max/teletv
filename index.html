<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | Secure Vault</title>
    <style>
        :root { --gold: #D4AF37; --bg: #050505; }
        body { background: var(--bg); color: white; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; }
        .card { background: rgba(255,255,255,0.02); border: 1px solid rgba(212,175,55,0.2); border-radius: 24px; padding: 40px; text-align: center; max-width: 400px; width: 90%; backdrop-filter: blur(10px); }
        h1 { color: var(--gold); letter-spacing: 2px; font-weight: 300; }
        .btn { display: inline-block; background: var(--gold); color: black; padding: 15px 30px; border-radius: 50px; font-weight: bold; cursor: pointer; margin-top: 20px; text-transform: uppercase; border: none; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="card">
        <img src="02_TeleTV_Logo.jpg" style="width: 120px; margin-bottom: 20px;">
        <h1>VAULT LOCKED</h1>
        <p style="color: #888;">Sync Handshake Key to proceed.</p>
        <label for="key-upload" class="btn" id="main-btn">SYNC NASA KEY</label>
        <input type="file" id="key-upload" accept=".json">
    </div>

    <script>
        const keyUpload = document.getElementById('key-upload');
        const mainBtn = document.getElementById('main-btn');

        keyUpload.addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            
            reader.onload = function(event) {
                try {
                    const keyData = JSON.parse(event.target.result);
                    
                    // We are making the check more flexible: 
                    // It will accept the key as long as it contains "TEL-TV"
                    if (keyData.protocol && keyData.protocol.toUpperCase().includes("TEL-TV")) {
                        
                        // Change UI to show success
                        mainBtn.innerHTML = "ACCESS GRANTED";
                        mainBtn.style.background = "#00ff00";

                        // Wait 1 second then jump to setup.html
                        setTimeout(() => {
                            // Using the './' ensures it stays in your GitHub folder
                            window.location.href = "./setup.html";
                        }, 1000);

                    } else {
                        alert("INVALID PROTOCOL: " + (keyData.protocol || "Empty"));
                    }
                } catch (err) {
                    alert("KEY ERROR: Ensure this is a valid .json file");
                }
            };
            reader.readAsText(file);
        });
    </script>
</body>
</html>
