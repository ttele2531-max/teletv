<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TeleTv | Universal Shell</title>
    <link rel="manifest" href="manifest.json">
    <style>
        :root { --gold: #D4AF37; --charcoal: #121212; }
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; background: var(--charcoal); color: white; text-align: center; font-family: 'Segoe UI', sans-serif; overflow: hidden; }
        #lock-screen { display: flex; flex-direction: column; justify-content: center; align-items: center; height: 100vh; background: radial-gradient(circle, #1a1a1a 0%, #000 100%); }
        #tele-logo { width: 300px; margin-bottom: 30px; filter: drop-shadow(0 0 15px rgba(212, 175, 55, 0.3)); }
        #status-text { color: var(--gold); font-size: 11px; letter-spacing: 3px; margin-bottom: 12px; text-transform: uppercase; font-weight: 600; }
        
        /* The Button that will appear on the TV */
        #master-btn { 
            display: inline-block; /* We show it by default for the TV setup */
            margin-top: 30px; padding: 18px 50px; 
            background: transparent; border: 1px solid var(--gold); 
            color: var(--gold); cursor: pointer; text-transform: uppercase;
            letter-spacing: 4px; font-size: 14px; transition: 0.4s;
        }
        #master-btn:hover { background: var(--gold); color: black; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <img src="02_TeleTV_Logo.jpg" id="tele-logo">
        <div id="status-text">SYSTEM READY</div>
        <button id="master-btn" onclick="startApp()">Install & Launch TeleTv</button>
    </div>

    <script>
        // Register the Service Worker (The "Brain")
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('sw.js');
        }

        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            e.preventDefault();
            deferredPrompt = e;
        });

        function startApp() {
            // 1. Try to add the Gold Icon to the TV/Phone Home Screen
            if (deferredPrompt) {
                deferredPrompt.prompt();
            }

            // 2. Launch your Cinema
            // Replace this with your actual movie portal link
            window.location.href = "https://your-streaming-link.com"; 
        }
    </script>
</body>
</html>
